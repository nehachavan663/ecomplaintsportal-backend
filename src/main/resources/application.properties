# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=${PORT:8080}

# ===============================
# APPLICATION NAME
# ===============================
spring.application.name=ecomplaintsportal

# ===============================
# MONGODB ATLAS CONFIGURATION
# ===============================
spring.data.mongodb.uri=mongodb+srv://ecomplaintsportal:Test1234@cluster0.kiaxhaa.mongodb.net/ecomplaintsportal?retryWrites=true&w=majority
spring.data.mongodb.database=ecomplaintsportal
# ===============================
# LOGGING (Optional)
# ===============================
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG


# File Upload Size Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB



# ===== MongoDB Timeout Fix =====
spring.data.mongodb.socket-timeout=30000
spring.data.mongodb.connect-timeout=30000
spring.data.mongodb.server-selection-timeout=30000

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yourgmail@gmail.com
spring.mail.password=your_app_password

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true